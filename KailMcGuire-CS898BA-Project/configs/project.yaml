project:
  name: maritime_hazard_detection
  course: CS 898BA
  task: object_detection
  scope: detect visible dynamic boating and maritime hazards in still images or video frames

dataset:
  primary: LaRS_v1.0.0
  source_root: data/raw/lars
  yolo_root: data/processed/lars_yolo
  conversion_profile: compact5
  external_benchmark_candidate: MODS

classes:
  - vessel
  - buoy
  - swimmer
  - paddle_board
  - floating_obstacle

class_mapping:
  vessel:
    - boat/ship
    - row boat
  buoy:
    - buoy
  swimmer:
    - swimmer
  paddle_board:
    - paddle board
  floating_obstacle:
    - float
    - animal
    - other

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  annotations: data/annotations
  checkpoints: models/checkpoints
  predictions: outputs/predictions
  metrics: outputs/metrics

processing:
  resize_width: 640
  resize_height: 640
  use_clahe: true
  use_color_normalization: true
  use_dehazing_experiment: true
  use_edge_analysis: true

training:
  baseline_model: yolo
  epochs: 30
  batch_size: 16
  image_size: 640
  seed: 42
