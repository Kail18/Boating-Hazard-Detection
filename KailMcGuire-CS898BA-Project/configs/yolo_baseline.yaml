yolo:
  weights: yolo11s.pt
  device: auto
  pretrained: true
  deterministic: true
  patience: 10
  cache: false
  plots: true

  workers:
    cuda: 4
    mps: 0
    cpu: 4

smoke_test:
  epochs: 1
  batch_size: 4
  fraction: 0.05

outputs:
  run_root: outputs/logs/yolo
  checkpoint_root: models/checkpoints/yolo
  metrics_root: outputs/metrics/yolo
  figures_root: outputs/figures/yolo
